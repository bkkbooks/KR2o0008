body:
  text: 經幄管見卷二宋曹彦約撰二十二日入講筵同侍講陳貴誼待對是日讀論國體篇三司言陜西入粟多髙其價直以取官錢且意邊臣有盗取入市者詔直史館盛元按其事召元謂曰守邊郡皆朝廷信臣職田俸禄皆有菽粟道途既逺不可輦致或平價輸官即議加罪亦所未便汝當審思此事但詰問民吏可也臣讀畢口奏用人必須加詳立法不須太察且如食廩出納以人情參之官兵俸禄豈無請多而用少者用之不盡豈無願糶者若出納頻數則支出者必有耗折交納者或有濕惡食廩之弊未易盡革所以坐倉收糴近世以為良法若使實有是物實有是價在公在私可爲兩便但作弊者不可不革耳真宗皇帝聞陜西入粟有髙價盗取之弊雖遣使按之然猶知守邊官吏職田俸禄皆有穀粟道路既逺不可輦致平價輸官難議加罪可謂盡見人情矣必曰守邊者皆朝廷信臣則知用人之初固已加詳於此然後稍寛其法孰不勉勵自克以報際遇兩淛鑄錢少銅有獻議請於銅鉛中參用瓦末十之二有司言若同鼓鑄與常錢無異上曰國家禁民為偽若是乃教人為偽不可許也臣讀畢口奏鑄錢本以便民非以謀利也生民之初種粟而後食織布而後衣以有餘補不足然後有貿易之道粟布固可以易械器械器固可以易粟布然而升斗與丈尺不相合巨屨與小屨不同價於是鑄銅為錢以權物價之輕重謂之圜法賤者一錢可得貴者貫陌可售此所以為便民也若欲其費省則半両五銖不得如鵝眼水浮若欲其易成則冶銅冶鐵不得如鹿皮楮幣然而貴此而不貴彼其不為謀利明矣又况古人作事無非所以寓教民之意教民以實猶恐其偽教民以偽何以能繼真宗皇帝務實去偽以教民為重也景徳元年上謂侍臣曰詔令之出尤宜慎重每一令行輿人不免横議或稍抑之又塞言路李沆曰搢紳之間易出謗議人之多言亦可畏也臣讀畢口奏禦寒莫如重裘止謗莫如自修真宗皇帝慮詔令之行不免横議或稍抑之又塞言路不以止横議為急而以謹重詔令爲急可謂得其道矣李沆當時名相尚以為搢紳之間易生謗議人之多言亦可畏也謂之易生謗議謂之多言可畏不歸咎於詔令之不謹而歸咎於謗議之可畏恐不足以發明真宗皇帝之本意景徳元年冬契丹犯邊澶州張秉上言已集兵夫治城上曰戎㓂在境内地亟完城壘無乃揺動人心以畏戎而謀城守耶亟詔罷其役臣讀畢口奏春秋魯威公之時齊人侵魯疆疆吏來告公曰疆場之事謹守其一而備其不虞姑盡所備焉事至而戰又何謁焉自古疆吏有常職備戰於無事之時而應敵於有警之際勝不告㨗敗不失守然後狙詐不能窺其際多方不能誤其定今契丹犯邊乃始集兵夫治城可謂不整暇矣何况是時真宗皇帝方欲幸澶却敵而守臣措置乖方如此宜詔罷其役也二十六日入講筵同侍講陳貴誼待對是日仍讀論國體篇三司言民犯茶有違法者望許家人論告上曰是犯教義非朝廷所當言不許臣讀畢口奏教義者萬世之公道𣙜禁者一時之利孔茶鹽酒三者人間之所必用籠其利而奪之一作此俑更聖哲不能弛其禁非得已也所謂家人者上而父子兄弟下至僮僕凡聚廬而處者皆家人也若使因茶禁而許家人論告以此而徼微利此齊景公所謂父不父子不子雖有粟吾得而食諸者也大哉真宗皇帝之訓乎以為是犯教義非朝廷所當言十字而已該括備盡急於謀利者可媿矣竊聞紹興之末有建議禁銅器亦欲許家人論告者此說一行即有以僕吿主之事時名臣張燾留守建康不欲行法具奏弛其禁人心乃安以此見言利犯教義之人何世不有通達國體之臣主盟公道之主未嘗不以教義為本也商賈自京便錢付外州多不即給付上聞之謂近臣曰州郡稽滯何嘗無之然失信於人非國家大體當諭三司速給遣之臣讀畢口奏商賈便錢非商自爲之也朝廷許其入納乃敢爲之且如今日朝廷欲支見錢十萬貫和糴於平江必須顧船搬運必須差官部送遷延一兩月所費水脚等錢不貲然後可以事濟若未及支降却商賈有見錢十萬貫願於平江入納續次赴行在請領無顧船差官之擾無日月遷延之患又無水脚不貲之費豈不公私俱便但是給付一時孰不願與官司交易若已納而稽滯不與不特失國家大體自是有合兊便處為商賈者亦不願入納矣知雜御史王隨上言所鞫殺人賊獄成望許凌持區斷上以語宰相曰朕觀其欵占初止規財物恐本無害人之意及家人叫呼廵捕者至揮刃而遁國家自有常法若行兵之際事不得已乃加此刑王旦曰風憲之任凡所抨彈自有典法此非宜言况事情可見一死亦已極矣臣讀畢口奏五刑中有笞杖徒流死載在令中毫釐必計甚而至於凌持必其罪極兇惡乃入是典豈廷臣一時奏請所得增損也大抵進言之臣少有習熟法令者一時建議徃往衝動條例知法令者又常切苦之而况凌持之罪可以任意擬之乎宜真宗皇帝所不與也凌持自與法令中陵遲字不同其義則一舊例皇城司日遣親事卒若干輩京城伺察上嘗訪於内侍且曰此軰察事必恐喝擾人自今非姦盗及民俗異事所由司不即捕者勿得以聞其言主典受賂須明得贓物方許言上右正言魯宗道上言皇城司遣人偵事民間細務一例以聞頗亦非便上曰叢脞之事多寢而不行攸司之職不可廢也臣讀畢口奏刺探外事本非朝廷令典若使朝廷之上用得其人則大臣可以開陳臺諫侍從可以獻納下情得以上達矣里巷細務雖不知亦可也祖宗時皇城司刺探外事往往承襲前朝之制所幸叢脞之事寢而不行主典受賂須明得贓證乃許言上始為得體不然將有如真宗皇帝聖訓所云此輩察事必有恐喝擾人者矣十二月初三日聚講同侍講王塈待對是日讀抑奔競篇右補闕胡旦獻河平頌太宗覽之謂宰相曰旦兇險躁憤文詞率謬今朝廷清肅安可置之臺閣又聞操履乖濫今須竄之逺地所獻頌當示三館使衆知其過遂黜為商州刺史臣讀畢口奏奔競者古今聖賢之所共惡然而不能革則以奔競者不恥於求也恬退者古今之所共喜然而不能用則以恬退者無意於進也惟其無意於進故愈不用則愈静而不恥於求者巧意窺測随時所尚或以勇辯或以姦詐或以謟䛕或以嗜慾如唐太宗所云者世常有之若使随取随與遞相倣傚奔競之風何從而革惟聖明在上察其情實躁憤者不用而恬退者選擢則奔競者不期息而自息矣十三日入講筵同侍講范楷待對是日讀論文史篇太平興國九年太宗謂侍臣曰朕讀書必究微㫖尚書云伊尹放太甲於桐宫三年以冕服奉嗣王歸於亳作書三篇以訓太甲此伊尹忠於太甲其理明矣杜預春秋後序云伊尹放太甲於桐宫乃自立也七年太甲潛出自桐殺伊尹立其子陟又左氏傳云伊尹放太甲而相之卒無怨色然則太甲雖見放還殺伊尹猶以其子為相此與尚書序說太甲事不同不知伏生昏忘將此古書乃當時雜記未足審也豈有殺其父而復相其子者乎且伊尹著書訓君具在方冊必無自立之意杜預通博不當慿汲冡雜說特立疑義使伊尹忠節疑於後人臣讀畢口奏萬物紛錯則垂諸天衆言淆亂則折諸聖自古傳記之說當天下混一之時已不免時有差誤至周衰之後國異政家殊俗舊典禮經不傳於諸國乘檮杌不合於春秋欲其不淆亂不可得也何况汲冡之書作於戰國魏哀王之時其言魯隱公晉獻公等尚是追書則其言太甲伊尹相去遼邈傳聞之事常多失實宜其不合也今考之伊訓太甲諸篇辭㫖温厚其言皇天眷佑商俾嗣王克終厥徳則必無伊尹自立之事其言尚賴匡救之徳圗惟厥終必無潛出殺伊尹之事則知叙書者與孟子所言復歸於亳皆孔門定書之正論也杜預晚見汲冡書明知其雜碎怪妄特以數事符同於左氏欲盡信其說以闢公羊糓梁二傳遂并與書序而疑之不思左氏所謂伊尹放太甲而相之卒無怨色與汲冡所載自不同也非太宗皇帝深究微㫖不足以證杜氏之誤上嘗問左右曰今何人修史蘇易簡曰楊徽之張佖梁周翰皆為修撰上曰史才甚難在乎善惡必書務摭實而去愛憎乃爲良史大凡帝王舉動貴其自然朕覽唐史見太宗所為葢好虚名者也每為一事必預張聲勢然後行之貴傳簡冊此豈為自然乎臣讀畢口奏孟子曰仁之實事親是也義之實從兄是也致治始於齊家自家刑國故不事虚名而實效自著唐太宗家道最不正内行不修飭徒欲以英武之資慕魏徵按原本作魏證避仁宗嫌名今改正仁義之論雖欲久假不歸傳諸簡册而其虚名著見終不可掩一傳之後唐室遂亂虚名之害終無益於政治如此不可不鑒也上又對宰相言及文章曰大凡為文須禀自天然是為俊秀茍襲他人蹤跡與自己出者逺矣向來名賢取士必采於詩賦出人胷臆可觀智識所以爲難蘇易簡曰頃前亦有請令禮部廢詩賦止以䇿論取士且百家子書皆致理之本㫖趣典雅若附之策論辯别亦難比來貢舉有簾獻三五十軸而無賦者就試之日含毫邈然多是失律乃知賦詠為難臣讀畢口奏聲律起於風雅頌散文起於典謨訓誥風雅頌一變而為離騷又變而為詩賦典謨訓誥一變而為詔令書檄又變而為策論經義以此取士皆足以得人特在上之人所以鼔舞天下者如何耳祖宗朝初以詩賦取士中其選者如王曾范仲淹軰皆渾厚君子則詩賦安得不重熙寧崇觀間以策論經義取士主其事者如章惇蔡京軰則論策經義安得不輕非科舉之有敝也人實敝之也自中興以後髙宗孝宗兼用詩賦論䇿經義無所偏廢得人之盛項背相望在朝廷之上奨進士氣以器識求人則詩賦論䇿經義皆可以得士也十八日入講筵同侍講范楷待對是日仍讀論文史篇上嘗謂近臣曰凡人多言禱神可以延福未必如此能行好事神必福之如禮記世子篇注云文王以憂勤損夀武王以快樂延夀且聖經之㫖必不如此葢注者不思之甚也文王焦思勞神以憂天下豈得減夀耶夏禹焦勞有錫圭之瑞而享國永年大約帝王能憂人之憂不自暇逸豈無感應鄭康成注此頗不近理安足為之鑒戒朕嘗與邢昺論之昺不能對臣讀畢口奏憂勤逸樂二者常相倚伏憂勤之效必有逸樂孔子曰如知為君之難也不㡬乎一言而興邦乎逸樂之過常至於憂勤詩曰汝雖湛樂從弗念厥紹如彼泉流無淪胥以亡此之謂也本朝名臣蘇轍論此事最為有理其言曰古之聖人無事則深憂有事則不慮矣夫無事而深憂者所以為有事之不慮也合於詩序始於憂勤終於逸樂之意若謂文王以憂勤損夀武王以逸樂延年既非事實亦非所以示訓也景徳四年上問王旦仲尼作春秋因言五經大義朕在藩邸時邢昺繼日講說但經籍立言各有㫖趣不能無同異每詢於昺但引義疏以對推之聖人應機設教所説同異終不能談其微㫖至若孔子言管仲如其仁復云與召忽事公子糾召忽死之管仲乃歸齊相桓公九合諸侯豈非召忽以忠死管仲不能固其節耶為臣之道當若是乎昺不能對似此常别舉故事明之臣讀畢口奏管氏之學不粹於聖人之道出處之際容有可議者故其成功止於覇者之事而已聖人於其人或褒或貶隨其事而言之不舉一而廢一既以小器目之又於其有三歸而譏其焉得儉於其樹塞門而責其不知禮愛而知其惡也然至於糾合諸侯不以兵車一匡天下民到於今受其賜憎而知其善也出處雖有可議而功過不相掩矣二十六日入講筵同侍講陳貴誼待對是日仍讀論文史篇上嘗謂王旦等曰經史垂文有國之龜鑑保邦治民之要盡在是矣然三代之後典章制度聲名文物參古今而適時用莫若漢史學者不可不盡心焉旦曰孔子生於周衰厯聘諸國退而刪詩書定禮樂以五常之道垂萬世法後之王者雖上聖必師範之古人云生民以來未有如夫子者葢以此也如云志在春秋者欲以褒貶極筆為終古誅賞之法使亂臣賊子觀而知懼兹立教之深㫖為國之大要司馬遷自謂一家之書葢知春秋凡例不可繼作故曰紀曰書曰世家曰列傳懲勸之微㫖在焉班固而下不出其意但增辭采而已上曰夫子之道不可斯須而捨迂儒或言堯舜之時無夫子亦治此淺識之甚殊不知夫子之道堯舜之道也故曰祖述堯舜憲章文武又曰惟天爲大惟堯則之其爲尊堯而宗舜至矣非謂夫子之道與堯舜異者也臣讀畢口奏上古之時民淳事簡故堯舜躬行而天下大治三代之後人偽日滋故周公孔子立言垂訓以惠天下後世然而堯舜之時猶且都俞吁咈講明義理非㝠行而偶合者也若謂堯舜之時無夫子亦治教天下亦任智自私不由講學此仲由所謂有民人焉有社稷焉何必讀書然後為學之論其口才足以動人要之實非正理宜孔子以為佞而惡之也是日又讀議修書篇景徳三年真宗臨幸崇文院訪編修君臣事蹟次序有未允者親改正之上曰朕編此書葢欲著明厯代君臣徳美之事爲將來法至於開卷覽古亦有資於學者自後日以草藁二卷進御上覽之翌日必條其舛誤而諭之上曰昨見編録亦有不盡本末之處前代詔令皆事出於一時必有所為而作今悉除之即不見本意尤當區别善惡務在審正茍前史褒貶不當即詔敕釐革時事當時因權臣專恣挾愛惡而爲者亦辨析于後庶覽之即明邪正修書若貴速成必難精要大業末撰著尤多而罕傳者豈非蕪雜之甚耶上又曰此書本欲存君臣鑒戒所以經史之外異端小說咸所不取每篇撰序冠于其首深可為之典法今所著序皆引經史頗盡體要然於戒勸或有未盡如直諫門但旌讜直若帝王飾非拒諫茍不極言即為邦國之患褒之可也茍國家常務偶有闕失又非帝王率情違法或以言比諷致其感悟即為美矣茍極加暴揚使惡歸於君顯闕政而賣已直亦非所取如文學門謂帝王當學際天人豈在歌詩賦頌若是則帝王無所用心皆不學矣何不但序文徳光被緝熙帝載之事至於吟咏情性存乎歌詩若大風横汾之比但戒其流蕩侈靡可也又務農門序帝王藉田事迹如漢之文武藉田年號並可注於其下云事自此始所貴便於檢閱大扺疑義闕聞之事慎勿以意更之但於下注臣等所疑所闕及未詳之意王欽若曰陛下出於睿思纘集此書精選名儒共議編綴今則漸成篇次至於垂憲立例類事分門經史去留事迹枉正皆陛下立其綱要示其條目其間違疑未安者動咨宸謨用成楷事適䝉宣諭義取勸戒為先實垂世立教之急務也上曰褒貶古人行事根究聖人用心亦甚難事茍書成外人無所攻斥則為善矣臣讀畢口奏今日所讀數叚皆真宗朝命王欽若楊億軰所編君臣事跡立例之初詳於議論而此一叚最為精詳此書纂修於景徳之初成於大中祥符之末八年而成凡一千卷詔題曰冊府元龜其間布置綱目斟酌去取皆出於真宗聖意無不深切最是論直諫一門於治道尤為有益既言帝王飾非拒諫又言人臣顯闕政而賣已直可謂兩盡君臣之道葢飾非拒諫者自是人君之過為人臣者當積誠懇惻委曲言之可也顯闕政而賣已直自是人臣之罪為人君者含忍而優容之可也為君盡君道為臣盡臣道豈不甚美若使人君聼言之際常疑其臣賣直人臣進言之際常疑其君飾非不憂已之職而憂他人之職為害甚大宜乎真宗皇帝有所不取也寳慶二年正月二十六日入讀同侍講王塈待對是日讀任宰執篇開寳八年太祖謂宰相曰年榖方登庶物豐盛若非上天垂祐何以及斯所宜共思濟物或有闕政當即振舉以成開泰之基太宗命趙普為相諭之曰朕以卿先帝舊臣功參佐命所宜勵心以副朕意勿以位髙自縱勿以權重自驕但能慎賞罰舉賢能彌愛憎何慮軍國不治朕若有過卿勿面從古人恥致君不及堯舜汝其念之太平興國八年宋琪李昉平章事李穆吕䝉正李至參知政事張齊賢王沔僉書樞宻院對於玉華殿上謂之曰朕為官擇人惟恐不當今兩制之臣十餘人皆文學適用操履方潔李穆頃莅京府甚聞嚴肅今此奨擢葢推公也因思閭里間每旦焚香祝天子萬嵗次則大臣眉夀朕與卿等焉得不日思善事以副億兆之禱琪曰臣等䝉陛下非次擢用又承戒諭豈敢為不善之事以負宸恩惟思公勤庶補萬一咸再拜謝臣讀畢口奏今日所讀皆太祖太宗任宰相事節目不同其要在委任責成而已臣聞人主無職事惟在於任相宰相無職事惟在於任賢觀祖宗任相之言思慮周宻遇年穀順成上天垂祐則益思振舉以隆開泰之基知閭里間祝天子萬年大臣眉夀則日思善事以副億兆之禱委任責成如此為宰相者安得不遵守聖訓舉賢能彌愛憎以底治功也漢武帝怒宰相除吏乃言卿除吏盡未吾亦欲除吏可謂失任相之道唐太宗任房元齡杜如晦曰公為僕射當廣求賢人比聞聼受詞訴日不暇給安能助朕求賢乎可謂得任相之道武帝上嘉唐虞下樂商周而乃海内虚耗户口減半太宗委政於人不親細務而乃外户不閉行旅不齎糧任相不任相其明效大驗如此太宗又顧宰相曰中書職在進賢退不肖但一郡一邑得一良吏即民受其賜卿在中書何由盡知中外官吏之賢愚他人舉薦各以類進卿更審詳可否善惡漸分亦致理之道也臣讀畢口奏人主所以任相大臣所以任賢皆所以爲民也立於朝者有愛民之論任於外者有愛民之政則恩澤可以流於民慶厯大臣以為欲知百姓利病須得好縣官欲得好縣官須得好知州欲得好知州須先擇轉運使副今日朝廷奨㢘吏惡貪吏雖州縣稍稍變革而所謂真贓大慝未見按劾則亦監司觀望之過也太宗皇帝論宰相進賢退不肖而以一郡一邑為首此致治之要務也
