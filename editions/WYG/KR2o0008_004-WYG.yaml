body:
  text: 經幄管見卷四宋曺彦約撰九月初一日入講筵同侍講范楷待對是日仍讀論貢舉篇大中祥符八年上覽禮部所奏進士名顧近臣曰今歲舉塲似少謗議適趙安仁等對亦以此語之矣王旦曰條制該偹可守而行至公無私盡在于此上曰舉人久留京師速當廷試旦曰今歲人數雖多未知幾何能中精選上曰為國求人無出此道然程試之際亦不可料有大手筆偶不得意者有素無才稱卓然特異者信知一名一第固非偶然臣讀畢口奏進士大手筆却塲屋間有偶不得意者有素無才稱却卓然特異者誠如眞宗皇帝聖諭大凡科舉取士全在主司得人蓋詩賦之與經義在塲屋之士何人不作得一篇但須觀其器識異時可以逺到乃為得人若詩賦只論聲病經義只看破頭則拘拘謭謭者常得志而魁偉磊落之士常不中選惟主司得人氣類相感然後㧞茅連茹可以致君澤民選擇之初不可不察也大中祥符九年上與宰相議貢舉因曰舉子大不易寒畯之士非主司盡公則何由得進至于經學望進塲第尤更艱難陳恕知舉咸言至公朕熟察之頗得文學之士然不與五科進塲第大招怨謗王旦曰恕本洪州人是歲江南舉子以鄉里避嫌多不為解甚招萋斐大約持心平允無所不可何必于父母之邦故為不足耶臣讀畢口奏當大中祥符九年時已有糊名封卷首之法矣陳恕知舉何為不解江南人若不許收試則是已取者猶拆卷而黜之也古人舉子舉讎皆所以為國若乃避嫌不解鄉人將以示公乃所以為私也欲避一己之謗而使江南之士皆不與選上以孤人主愛賢之意下以阻寒畯致君之路豈不謂之以私害公耶是日又讀論科試篇咸平二年殿中丞皇甫選請復制科眞宗曰今之詩賦俊秀事業若取時才政事當在䇿論俟商𣙜行之臣讀畢口奏祖宗以制科取士最為得人如富弼吳育張方平蘇軾兄弟皆由此選近來少有應者遂不復降詔外間不知妄謂朝廷無意於此不知乃主司之過也制科取士固欲其博洽然經史明文有所不知乃可責其膚淺若主司撰造題目多方以誤之則愛賢之意果安在哉聞往歲試過閣六論有以堯舜湯禹如何為題者取西漢魏相傳内所載趙堯李舜兒湯貢禹之序以亂堯舜禹湯之名欲其不通報罷是以古聖人之名為戲其為失體莫甚于此今若修祖宗故事復舉制科必須出當道正大題目取其四通俟其對策䟽謬報罷可也若雖對策可取異時履行不稱則擢用不擢用却在君相造命矣十七日便殿聚講同侍講范楷待對是日讀論選集篇景徳二年有司以常選人奏御上謂王旦曰比年審官流内銓引對官吏皆積留多日方一引對且旅寓輦轂淹久可念又于所司頗有所費用若主判者不能振舉即選士愈為不易朝廷既責其亷豈得更容邀滯自今當為定制不得復然臣讀畢口奏國初銓選之法承襲五代之弊未能盡革祖宗隨時制宜多所是正今銓選法宻雖未能有所甄别然守之而行亦可以示公若眞宗皇帝論審官流内銓之弊一則慮積留多日有旅寓之費二則慮主判者不能振職有所司之費且謂朝廷既責其亷豈可更容邀滯大哉聖訓此所謂明照四海而不遺微小者也不䘏之于其初使之浪有所費賢而亷者固不應改節中人以下之性未有不責償于此者豈不為大可慮昔之審官院乃今之尚左昔之流内銓乃今之侍左果能體真宗皇帝之訓關會急速不使之有所積留檢柅吏姦又不使之有所觀望然後可以責其亷矣二十日入講筵同侍講陳貴誼待對是日讀擇官篇至道元年廣南官年滿未代者有司請先次差官上曰嶺南服從王化夷俗丕變尤須擇平允識事體者任之則逺人受賜若慮淺常材闇于理道徒益生事耳益州張詠上言所部知縣三人欲以他官對易之上曰任官之道各有所宜蜀民輕浮好為逰樂官吏政寛能與之浮沉民即便安若稍執綱紀動即怨懟朕每命一官無非愼選詠之所奏未可許也臣讀畢口奏祖宗時廣南川蜀向化未久擇平允識事體及政寛與之浮沉者治之乃其宜也今日之患又不在此但慮官吏貪求擾及逺民耳蓋廣南與蠻猺黎洞接境川蜀除北邊之外又與吐蕃六詔接境仕于其間者不問中外之事體朝廷之委任以其地産金珠又多物貨享厚禄者更欲商販恃威力者遂至白攫邊釁之起常必由此未有推究病端削平禍本者今下州小縣時取一小吏按發之不足以變貪俗著治效其要􅋀不在此也若朝廷遴選監司帥守以刺舉􅋀責之不過數人而六路治矣此今日最急之務也至道二年上謂近臣曰國家取士必歴級而陞下位之人韜晦才行誠亦有之當勿以此為限成朕急賢之意因言為臣之道治平之代難見功效亂世止用其才如陳平韓信頃刻可立功業治平之世即此輩無以施其謀略故孔子四科以徳行為首咸平二年眞宗令宰相選官堪三司職事者數人因謂之曰庶官中求才幹則不乏詢徳行則罕見其人夫徳為百行之先徳行之門必有忠臣孝子豈無徳者能全其忠孝乎臣讀畢口奏太宗皇帝取士以徳行為首眞宗皇帝選官亦以徳行為先此萬世不易之論也古人以徳行為才故髙陽氏髙辛氏之才子齊聖廣淵明允篤誠忠肅恭懿宣慈惠和此十六字者無非徳行之所發見後世以欺詐暴虐為才如狄之酆舒晉之知伯齊之盆成括皆以才稱至于敗事故有徳勝才為君子才勝徳為小人之論其實本非才也韓信彭越之徒以術數事髙祖髙祖亦以術數待之君臣之間以勢利相持至葅醢而後止人徒見小人之術數粗若可喜引而用之謂且使之集事不知人無忠信不保其往如王安石之用吕惠卿韓忠彦之用蔡京不獨誤國又從而擠之然後知取士選官非徳行不可易曰大君有命開國承家小人勿用又曰小人勿用必亂邦也聖人之示戒其嚴如此可不深鑒二十四日入講筵同侍講章􅝘待對是日仍讀擇官篇景徳元年内出京朝官二十四人名付閣門召對崇政殿案真宗朝察羣臣有聞望者得刑部郎中邊肅等二十四人令閣門引對觀其辭氣文義並得優升見宋史選舉在外者乘傳代歸上采于朝論皆以廉幹稱者及對或試其辭業或觀其言論多寘于臺省舘殿遷秩任之是冬契丹請和上以河朔諸州易置牧守召近臣對資政殿御筆題李允則等十二人示之曰朕酌庶官能否以邊城逺近要害分命治之庶保寧靜卿等當更詳議畢士安曰陛下所擇皆才適于用望付外施行從之臣讀畢口奏真宗皇帝欲選臺省官則内出京朝官二十四人欲選邊城官則内出李允則等十二人自常情論之人才天下公器何必以内出姓名為重蓋真宗皇帝勵志求賢或取之薦舉或考之奏對既聴其言又觀其行既信其人又觀其所主非如自古人主得之于宦官宫妾創為内降以害朝政也公莫甚焉所謂二十四人與夫十二人者雖不盡見姓名只以李允則推之則真宗在潜邸時固已識其名矣時允則行事未有功業者至此題其姓名而用之明效大驗昭不可掩論本朝守邊之臣未有出于允則之右者人主留意人才如此安得而不致治二十七日入講筵同侍講范楷待對是日仍讀擇官篇大中祥符八年上嘗閱兩省班簿謂王旦等曰近侍之列各有所長然求文武適用可委方面者亦鮮每念唐賢比肩而出何當時得人之多也旦曰方今下位豈無才俊或恐㧞擢未至然觀前古進賢樂善者甚衆故人不求備不以小疵累大徳是以人得足用今立朝之士誰則無過陛下無不保庇然流言稍多終亦梗于任使大都迭相推譽近乎黨糾訐乖謬近乎公鑒其愛憎惟託聖明則庶無棄人矣臣讀畢口奏唐賢比肩而出得人最多實如真宗皇帝聖諭王旦之對雖合事情然亦似有為而發臣嘗論唐朝取士與今日事體不同名為科舉實采譽望其不由科舉進者又有藩鎮辟召或以白丁命官或自下僚選擢考其平素取其行實故為士者知自愛重其始也莫不學為有用之才其出也莫不重于所事士類歆豔以為美談及其久于幕府習熟事機一旦朝廷用之便為顯官在内則論思獻納在外則仗鉞守邊惟其所用無施不可今日諸大帥雖皆有辟召之權然或壓于勢要惑于親舊凡所汲引未必皆是當才不得如唐藩鎮遴選之公至使緩急差除無以應手今欲慕唐朝得人之多必須畧加警策取其得人多者有以旌異之得人少者小小戒勑之則自今以往每有所薦必深加思慮不敢泛然應故事矣十月初四日入講筵同侍講范楷待對是日讀論薦舉篇淳化五年上嘗語宰相曰君子與小人􅃐向不同君子畏慎矜荘不欺闇室執持名節造次靡踰小人内荏外剛見人亦能卑謙有禮但發言則似忠信履行則多頗僻此所以難辨然亦不能常久其始仕宦也惟利是視狥私黷貨罔畏憲章茍暫時獲免終亦彰露當未敗之際日懷憂懼故不自安薛智周為侍御史知婺州政以賄成土俗多以羅帛為獻州民謂之羅端公則其治可知卿等居廟堂之上以審官求賢為職今來擇人舉官以是逐末若更不擇舉主則何由得人臣讀畢口奏太宗皇帝論君子小人趣向情狀可謂詳且明矣今欲遵而行之則黜陟之際尤當有所執守任賢在于勿貳去邪在于勿疑祖宗時小人徇私黷貨雖曰罔畏憲章然猶日懷憂懼故不自安今州縣間小人恣為貪墨捆載席卷殊無忌憚推求其故或者施行之際任賢猶有貳而去邪猶有疑也任賢而貳則監司帥守無舉刺之權去邪而疑則贓吏無警懼之意不可忽也竊怪今日士大夫敢于害物至所以待贓吏酷吏者何其恕也且如監司帥守按發一知縣不法歴數其罪至于永不得與親民差遣其為人可想見矣顧乃厚賂胥吏極意結託不過一二年間行下保明便與無過人一等士大夫明知其不可不敢任怨放行參部便受一縣此等習慣成風視貪虐為當然揚揚得志少有變其舊習者則斯民受苦何時而已耶今欲任賢去邪必須明降指揮今後監司帥守按發贓吏酷吏已降指揮永不得與親民差遣者如遇改正必須得兩省侍從臺諫三人以上列銜保舉見得前奏委是寃濫方與放行若前奏裝飾太甚别無事迹亦可以證監司帥守欺罔之過如或不然何忍使無辜赤子受禍于此輩之手也初九日入講筵同侍講范楷待對是日讀論甄叙篇真宗皇帝即位詔俟易月公除始行恩命吕端曰今亡官失爵之人翹望甄録不可稽也上勉從之臣讀畢口奏國初䘮禮行前代以日易月之制故以二十七日為公除自孝宗皇帝以來行古道三年之喪故以二十七月為公除今陛下行三年之喪禮無違者既御正殿觀瞻一新行慶施惠乃其時也前者登極之初雖已赦過宥罪然二年以來犯法者衆士大夫自蹈憲網官職且不必問惟是遷謫遐方使父子不相見兄弟妻子離散甚者不服水土有性命之憂聖明之世不宜有此不于此時行一次寛典恐未有可生之路也本朝自元祐以前愛惜士大夫賞重罰輕以為家法唐介論事失當仁宗震怒責授春州别駕越明日即改英州不數月又改郴州酒稅復以潭州通判用之願陛下于正殿未御之前體仁宗所以閔唐介之意與大臣熟議行之不勝幸甚十四日入講筵同侍講范楷待對是日讀奬幹臣篇景徳元年引進使何承矩再任雄州上曰承矩將家子知書好名練習軍旅邊防之事今命領郡當擇美名授之即命為英州團練使三年上覽太常博士李及奏議顧宰相曰及昨日對來為人詳審臣僚居下位懷才守道固亦有之王旦曰及與父凖並登進士第在官有治迹群臣之中晦能韜光誠亦有之惟陛下精擇上又謂王旦等曰藩城長吏尤頼循良之士永興孫全照馭下峻整當擇其代如邊宿孫僅皆可此授馮拯曰僅嘗佐京府熟于民政上然之大中祥符元年亳州李廸上言州卒亡命聚衆近境為盗鄉邑憚其凶悍已遣使臣有武幹者分領戍兵各處要路捕逐至宿州就擒上曰廸有才力謙下和衆若非臨時有斷豈能如此集事甚可嘉也臣讀畢口奏今日所讀皆真宗皇帝奬幹臣聖語仰惟真宗皇帝好善而忘勢恭儉而禮下詢學問于蒭蕘受誹謗于民庶故能知民疾苦使士大夫心術瞭然無隱于黼座之前則賢且能者莫不勉力自慰愚不肖者亦能恐懼修省如此而天下不治未之有也今陛下守祖宗成憲日對羣臣自宰執奏事之外臺諫則有論䟽講筵則有誦說職事官皆有輪對監司郡守到罷則有奏事博采而廣求之則士大夫心術無不盡知矣古人明見萬里之外不過如此二十二日入講筵同侍講范楷待對是日讀戒官吏篇淳化四年上嘗語宰相曰今天下至廣勿謂好人少蓋設官分職在外者衆儻若聚之則多矣朕每逢一盡公有操檢者恨不能分而用之茍盡心于國不惟爵賞併至神明亦當擁䕶臣僚每授使外州卿以此言諭之以表朕意臣讀畢口奏自古天下有君子有小人世治則好人常多世亂則好人常少其故何也蓋人才有三等上焉者所謂上智不移不能為不善下焉者所謂下愚不移亦不能為善惟中人之性可以語上亦可以語下時乎清明必能勉强振作求為君子之歸故世治則好人常多時乎混淆亦能狐媚茍合淪入于小人之黨故世亂則好人常少然則好人之多少係乎中人可上可下者之所為在人主作成之耳本朝太宗盛時人才輩出趙普李昉吕蒙正張齊賢吕端為宰相李穆李至㓂凖向敏中為執政田錫王旦畢士安王禹偁之徒為兩制在上位者如此則在下者可知矣方以類聚物以羣分同聲相應同氣相求舉直錯諸枉則枉者自直在人主加意焉十一月初三日入講筵同侍講范楷待對是日仍讀戒官吏篇大中祥符元年上嘗語近臣曰有司臨事惟在執守不當曲徇物情以沽時譽若使怨讟歸于上美聲萃其身非良吏也臣讀畢口奏人臣善則稱君過則稱已若使怨讟歸于上美聲萃其身可謂非良吏也然而徇物情以沽時譽與咈物情以徇已私者每相反對故堯舜之時以違道以干百姓之譽與咈百姓以從已之欲者明為儆戒謂其皆足以害治也本朝盛時䘏民者有賞而虐民者有罰咈百姓以從已之欲者固所不敢而違道以干譽者容或有之故真宗皇帝以徇物情沽時譽為戒然二者常相倚伏習尚變遷時移事異所當深察近時掊克聚歛咈百姓以從已欲者常多違道以干譽者常少則二者皆當示戒也二年謂近臣曰臣僚赴外任有陞殿者朕皆喻以所行之事期于振舉若不陞殿者今當各以其事為戒勵詞摹印賜之先帝嘗以儒行篇賜臣下今當復印分賜文臣仍于戒勵敇中申諭先帝之㫖且漢制刺史以六條問事齊有五條晉有六條但漢世令長未睹訓勉之詞令長亦親人之官今當喻以舉政經急民病為本乃御製文臣武臣七條文臣一曰清心謂平心待物不為喜怒愛憎之所遷二曰奉公謂公直潔己則民自畏服三曰修徳謂以徳化人不必專尚威猛四曰責實謂專求實效勿競虛譽五曰明察謂明察民情勿使職役不均刑罰不中六曰勸課謂勸諭下民勤于孝悌之行農桑之務七曰革弊謂求民疾苦而釐革之武臣一曰修身謂修飭其身使士卒有所法則二曰守職謂不越其職侵擾州縣民政三曰公平謂均撫士卒無有偏黨四曰訓習謂教訓士卒勤習武藝五曰簡閱謂閱視士卒識其勤惰勇怯六曰存䘏謂安撫士卒甘苦皆同常使齊心無令失所七曰威嚴謂制馭士卒無使犯禁分賜文武授外任者仍許刋石圖壁奉以為法臣讀畢口奏真宗作文武七條傳之後世與宋無極但當時所分賜與所刋石圖壁今少有存者人情積久易以弛玩願陛下清閑之燕親灑宸翰勒之金石摹賜内外文武臣僚庶幾一新觀瞻知所自警也初九日入講筵同侍講范楷待對是日讀論道教篇開寳二年車駕幸華州召道士蘇澄隱對行宫使掖陞殿謂之曰朕于京師起建隆觀思得有道之士居之聞師自前朝不應聘召豈尚戀鄉土耶澄隱曰梁園帝里天下繁會林泉之士非可寄迹又幸所居問之曰師年餘八十容貌甚少是能養生也宜以其術教朕澄隱曰臣所養生不過精思鍊氣若帝王飬生則異于是老子曰我無為而民自化我無欲而民自正無為無欲凝神太和軒轅黄帝享國永年者得此道也上大悅太平興國九年華山道士陳摶至京師上謂宰相曰摶獨善其身不干名利信乎方外之士常言三教之理其歸一揆釋氏以慈悲老子以清淨宣尼序五常俱化民之要道若安民治世舎五常之教固亦不可嘗問修養之術自云不知燒煉亦無吐納之理但存神養氣意行則行意卧則卧直如白日上昇亦何益人間事曷若聖賢治世天下安樂如此功徳豈不大哉宋琪曰摶服氣修身肥遁不仕周世宗以厚禮聘召暫到闕廷今兹不召而至蓋帝徳光被故異人自出臣讀畢口奏釋老二教本皆所以獨善其身依聖世而後能立人以其寡欲無求特禮待之又以其潔身無穢可以奉行齋醮其中有出羣㧞萃者亦能通知義理粗識時務非實有保國祚延壽之術也後世張大其說乃欲下視堯舜鄙薄孔孟背理傷道不可以為訓時君世主有輕用其說者大興土木以為功捨身踐法以為敬反與其教大相背戾惟聖明之君乃不如此彼稍知道者亦不如此今蘇澄隱能精思鍊氣又能以無為無欲為享國永年之道陳摶能存神養氣又能以天下安樂為治世功徳可謂知道之言不欺于君上矣非太祖太宗之聖無以致其言也十四日入講筵同侍講范楷待對是日讀論釋教篇太平興國八年譯經院上新譯經太宗出示宰相曰此胡僧新獻貝葉今以華言譯之無所增减朕于此教深悟宗㫖凡為君治人却是修行之地行一好事天下獲利即釋氏所謂利他者也凡庶之人無權無位縱或修行自苦不過獨善一身如梁武捨身為寺家奴此真大惑書之史冊為後代笑為君撫育萬類皆如赤子無黨無偏各得其所豈非修行之道乎方外之說亦有可觀者蓋行其教非溺于釋氏也趙普曰陛下以堯舜之道治世以如來之行修心聖智髙逺洞悟真理固非臣下所及雍熙二年上聞京城外有僧積薪將自焚謂左右曰此輩幻惑衆庶不可長也當配𨽻逺州仍毁所住院因思比來奏請建寺甚衆屋無數間便乞名額多是不逞之輩誑惑閭閻藏隱姦弊不惟干撓國法抑亦玷辱梵教自今非大寺院無得奏請賜額臣讀畢口奏太宗皇帝論及佛教以為人君撫育萬類皆如赤子無黨無偏各得其所即是修行之道可謂深察浮屠氏之要㫖至庸僧欲積薪自焚慮其幻惑衆庶即配𨽻逺州毀所住院不為異端所誑如此惟公于道者乃能行之十二月初三日入講筵同侍講范楷待對是日讀重牧宰篇咸平初直史舘樂黄目請自今差擬知州縣令俟及三十人引對御前試時務策取其材識明于吏理達于政教者真宗曰黄目詞理頗精然歴代沿革有異難遽行也今之求人莫若擇人使其外舉聞州縣官闕員甚多當選清望官勿限員數各令舉其所知庶得良吏以親吾民知雜御史范正辭上言牧宰之官最為急務今舉屯田員外郎吳蒨等五人堪知大郡望令蒨等于京官選人内各舉縣令三人上曰縣令于民最親尤當慎選臣讀畢口奏人主以論相為職必須委任大臣大臣以掄材為職必須擇監司郡守郡守之不職者監司得以按察之知縣縣令之有闕額者郡守得以舉辟之則天下自治矣今三邊郡守黜陟付之制帥縣令有闕亦得舉辟雖未必一一皆公然而要害去處亦不敢輕于用人但内地知縣縣令注闕銓曹惟意所向能與不能初無分别為郡守者常恨知縣縣令之不相佐助為知縣縣令者常恨郡守之不相體察今若使知縣縣令有闕許郡守于待闕任滿或參部人中選而用之但不可改差在任人又不可衝他人窠闕既州縣事體相關必不至冐昧妄有舉辟若其不恤事體妄舉非才則給舍得以繳駁臺諫得以論列監司得以按劾然須先擇監司郡守乃可行此真宗皇帝所謂求人莫若擇人范正辭先舉知大郡五人令各舉京官選人縣令三人即此意也十四日入講筵同侍講范楷待對是日讀議將帥篇國初諸僭國未下西北未賓服太祖留心將帥命李漢超屯關南馬仁瑀守瀛州韓令坤守常山賀惟忠守易州何繼筠領棣州以拒虜郭進控西山武守琪戍晉州李謙溥守隰州李繼勲鎮昭義以禦太原趙贊屯延州姚内斌守慶州董遵誨屯環州王彦升守原州馮繼業鎮靈武以備西戎其家族在京師者撫之甚厚州縣管𣙜之利悉以與之恣其回塗貿易免所過征稅許令召募驍勇以為爪牙凡軍中事許便宜每來朝覲必召對命坐賜以飲食錫賚殊異以遣之由是邊臣富于財得以養敢死士使為間諜洞知蕃夷情狀每敵兵入㓂必能先知預為之備設伏掩擊多致克㨗二十年間無西北之憂盡平諸國蓋推赤心善御將之所致也臣讀畢口奏任將之道不過有三說考其素以觀其能久其任以責其效寛其財以重其權是三者不可廢一也古人任將常必由此後世擇之不審固已不得其人得其人而用之又不能久其任不能寛其財縱有能者亦不肯盡其技也近日朝廷用人固已重于選擇使其未有過失亦不致輕于改易惟是財賦一節尚合區處蓋自十年防邊以來諸軍出戍少有在寨者平時回易酒課等利源盡皆廢弛至軍用錢每每不給無以旌别驍勇收召豪傑廣布間探甚至軍中器械不復修葺緩急赴敵惟見敗事今縱未能盡如太祖之制筦𣙜之利悉以與之亦必與之區處使之不至窮陋亦太祖御將之本意也二十五日聚講同侍講范楷待對是日仍讀議將帥篇淳化二年上嘗謂近臣曰古之烈士誓以死節許人未逢知己或隱屠肆或匿抱關朱亥侯嬴之輩是也俟逢知己一言道合必死節報之今見凶豪之輩逢人必許以死但恐臨事之時心口難副近臣曰古之烈士如藺相如樊噲者雖志雄毅而相如能引車避廉頗樊噲說髙祖不取秦中寳貨而軍灞上此所謂屈伸有禮者也任氣之士固不足取臣讀畢口奏勇者出于天資義必出于學力勇而不知義則盗跖之徒耳固不足道知義而不知講學則朱亥侯嬴之徒耳遇知己道合則以死節報之亦所以為義惜乎其不大也義之大者必尊君親上必愛人利物可以安國家可以惠後世見義而為則其勇為達徳藺相如勇于秦而引車避怨非畏廉頗也知國事大于私爭而欲協力以强趙也樊噲勇于戰而說髙祖退軍灞上非不愛寳貨也知天下大于寳貨而欲胚渾漢業也非素有講明何以知此但古人為學得于胷臆非如後世詞章之富故不可以相如樊噲之徒為知學耳太宗皇帝論烈士之勇而近臣之論有取于相如樊噲蓋以義為主者故得以推廣之寳慶三年正月十一日入講筵同侍講章􅝘待對是日仍讀議將帥篇大中祥符二年上語近臣曰嘗聞臣僚中有以醜言詈軍士者茍有罪杖之可也何須面辱李繼和在邊郡虐使軍士無事具介胄分部伍坐公宇中稍或不整則撾擊之不下三十數且安靜之時虛使勞苦豈能樂用朕屢申戒之然其禀性未革鎮戎僻在一隅屯兵不少軍中皆有流言每代還者畏其復去觀此固非馭衆之材王旦曰傷于嚴急則亦生患或者自恃清潔故也上因論將帥材難今文武中固亦有人蓋不經戰陣無由而知雖邊鄙無事然兵不可去戰不可忘古之道也或有請用儒將者王旦曰朝廷文武中賢才俊彦固亦不乏望歴試之以觀能否臣讀畢口奏擇將之道難得全才事姑息者易玩狎好嚴急者難親附恃廉潔者多陵忽甘穢濁者尚交結有一于此皆足以敗事惟人主明見至隱必試而後用之然後可以得人若冐昧用將非國家之利上又曰邊城常整葺積穀聚人不可弛也選練將帥固須用心馬知節曰將帥之才非坐而知之顧臨事機變如何耳如咸平中將帥方略無聞措置未便不能擒翦敵㓂蓋未得其人今朝廷士馬雄盛夐越前古器甲犀利邊城堅固茍契丹渝盟邊防有警陛下得人授之成算可無噍類臣今未老五七年間尚堪驅策但得一副部署及名馬五七匹輕甲一聨足矣上曰誠知卿可屬此任但四方無事耳因命製銅鐵鎻子甲賜之上又曰知節久在邊防以為禦敵之策何者為善知節曰邊防之地横亘雖長然據要以扼其來路惟順安軍至西山不過二百里若列陣于此多設應兵使其久莫得進衆將疲弊時以竒兵輕騎逼而擾之如敢來犯即深入力戰彼必顛覆不暇今之將帥喜用騎兵以多為勝且騎兵之多者布滿川谷用之有限茍墻進而前小有不利則莫之能止非所謂節制之師也臣嘗謂善用騎兵者不以多為貴但能設伏觀敵兵之多少度地形之險易敵少則邀而擊之衆則聚而攻之多依城邑為旋師之所無不㨗矣臣讀畢口奏中國夷狄皆有長技人所共知少有能兼収之者夷狄之長技惟弓與馬棄馬而行不能進一歩持一弱矢必命中一人人以此畏之不知一馬之地可以容十卒十馬之地可以容百卒弓以近取中弩以逺得力馬無常性人有定嚮如此則歩勝于馬弩勝于弓中國之長技勝于彼長技者多矣又中國多水鄉江淮荆鄂之間多有湖泊尤非騎兵之便我之舟師非彼所敢望也今人但見彼以馬來亦欲以多馬敵之非善計也馬知節謂騎兵布滿川谷用之有限小有不利莫之能止但欲以騎兵設伏邀擊非深于知兵者不能語此
