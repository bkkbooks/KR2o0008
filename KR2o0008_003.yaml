body:
  text: 經幄管見卷三宋曺彦約撰寳慶二年二月初二日入講筵同侍講王塈待對是日仍讀任宰職篇景徳初北道用兵毎邉奏至凡軍旅之事多先送中書上謂畢士安冦凖曰此皆欲卿等先知中書縂文武大政樞宻院雖專軍機然大事須本中書頃來李沆徃徃别具機宜上奏卿等當詳閲之但干討論者悉言利害勿以事干樞密而有隠也因言樞要之地尤須慎密漏禁中語古人深戒若與同列及樞密彰不協之跡則中外得以肆其間隙實非所便卿等志之臣讀畢口奏古者論道經邦爕理隂陽上欲合於天心下欲合於吏治則兵民之事無所不統唐代宗始置樞密使止以宦官為之至五代時唐荘宗用郭崇韜軰始與宰相分事而治本朝冨弼張方平范鎮皆議之以其脉絡不相貫循習既久未能頓革中興以後時或以宰相兼樞密使分兩府以贊其長為近古矣宰相嘗議以學士晁迥領銀臺司代王曾以曾領三班院上曰朕聞外議謂曾嘗封駁詔敕自是中書多沮曾奏事今若罷去是符外議旦曰臣等本無忌曾之義今聖慈宣諭為宰司避謗請以迥代盛度曾如舊職上可之旦因言今封駁之任與古不同大抵除改差遣大小皆先奉進止繼入熟状俟其可奏然後降敇此外或差誤有害勘㑹失實臣等省視不至實恐有之頒下四方誠為不當封駁官司茍能詳覽改正乃助臣等不逮必無怨責之理上然之臣讀畢口奏先朝之銀臺封駁司今給事中職也祖宗設給舍臺諌所以助政令之所不及最為公道若使政令差誤給舍臺諫不敢言則淫朋比徳人主孤立矣真宗皇帝以王曾封駁詔敇欲久其任王旦謂封駁司茍能詳覽改正乃助臣等不逮可謂君臣同徳前古未之聞也初六日入講筵同侍講王塈待對是日讀禮大臣篇李昉授司空致仕詣崇政殿見上具述遭值聖朝踐歴崇顯無功報效恩寵過厚因屑涕稱感上憮然動容召陞殿謂之曰卿美事備矣朕比慮卿以年及請老故遣宰相諭㫖而卿言堅確不欲奪卿雅志况不離京闕要見朕時固不妨也昉又作詩謝恩即日和賜仍别賜一首以申褒遇又嘗語近臣曰昉可謂善人君子事朕兩在相位未嘗有傷人害物之事亦常人所難能也臣讀畢口奏禮大臣諸篇無非尊禮大臣之意其於同心同徳之事語未及也獨此一段論李昉善人君子未嘗有傷人害物之事敢推廣而言之夫傷人害物者愛人利物之對也愛人利物謂之仁傷人害物謂之不仁人主以仁而守寳位大臣以仁而在高位設以不仁存心則天下受其害矣唐徳宗即位之初擢崔祐甫為相祐甫以道徳寛大推廣上意建中之政庶幾貞觀按原本作正觀避仁宗嫌名今改正及盧杞為相諷上以刑名整齊天下循至播遷用相之仁與不仁其利害立見如此本朝以仁立國君相同心而李昉又稱善人君子無傷人害物之事真宗皇帝守位本心可以想見於此矣十二日入講筵同侍講章􅝘待對是日仍讀禮大臣篇大中祥符九年四月上謂王旦曰日官言今夜太隂當虧朕已别建道塲恭祈靈應卿當徃行禮益加䖍禱旦曰臣以虚薄謬當大任陛下眷待近列休戚是均愚臣何以為報臣讀畢口奏真宗皇帝以太隂當虧别建道塲令王旦行禮旦遂有眷待近列休戚是均之語何也蓋日者人君之象月者大臣之象日食所以警戒人君月食所以警戒大臣真宗皇帝慮太隂當虧大臣受其害設道塲䖍禱又令王旦自徃行禮所以屬意大臣者甚厚王旦謂愚臣何以為報固其宜矣詩言彼月而食則維其常此日而食于何不臧大意以日食為重耳若月食雖輕於日食猶能災及大臣不可謂全無事也是日又讀優近臣篇太平興國八年以王顯為樞宻使上謂之曰卿世非儒家少罹兵亂必寡學問今在朕左右典掌樞機固無暇慱覽群書顧左右取軍戒三篇授之曰讀此可免靣墻矣臣讀畢口奏宰執大臣當代天理物之任非止一官一職而已不本諸簡冊豈可以佐王治邦國也自唐末五代之際日尋干戈當時大臣以權謀為上聖賢之教掃地盡矣大亂極弊一轉而為本朝累聖相承復還舊觀太祖謂宰相須用讀書人太宗用樞宻使而慮其寡於學問至以軍戒示之故本朝文治之盛前朝所不能及也中書舍人王祐以疾告假滿百日上謂宰相曰祐文章器業復有清節不中理之事斷不為也當優奨之宰相言中書舍人止遷後行侍郎特命以兵部授之臣讀畢口奏祖宗朝官制遷轉雖有定格然人才有高下事任有劇易猶與大臣議之加輕重於其間此所以為造命也吝惜名器則當遷者稍殺其級如通事舍人焦守節當得閣門副使止與尚衣庫副使是也奨㧞勲賢則平遷者當異其數如中書舍人王祐當遷後行侍郎却與先行是也自改官制後一切付之有司止以日月為限則造命之意鮮矣十七日入講筵同侍講章􅝘待對是日仍讀優近臣篇吕蒙正王沔罷中書㑹中書省吏舊罪發事頗連及因有奏毁者上曰䝉正有大臣體沔甚明敏言者慙而止臣讀畢口奏體貌大臣要當始終如一蓋小人傾險無所不至當大臣用事之時極其䛕謟動輙附和及一旦罷政則揣摩觀望便生詆訐惟聖明而後可以察見且如小吏犯法何闗道揆輕重吕䝉正王沔一罷中書便有奏毁之者真宗皇帝灼見情偽謂二臣明敏有體使奏毁者不得行可謂盡體貌之道矣真宗命李至為武勝軍節度至固辭上曰唐朝故事廢之已久今特振舉以為寵渥無煩懇譲臣讀畢口奏唐官制雖重内輕外然節度觀察有闕則近臣為之徃徃多著顯效如裴度李徳裕之徒治軍治民皆有實政蓋唐世不妄辟客必須有物望之人其辟客又皆參軍事耳目習熟識其施設及至選用出鎮易以辦集非如後世書生平日不習兵法州縣僚属未嘗與聞軍事間或有志事功冐昧討論終非身所經歴出於勉彊真宗皇帝倣唐朝故事用李至儒臣為武勝節度有意乎復唐制矣翰林學士朱昻求致仕居江陵上曰昻在内署未嘗以私意干朕清素自守年踰七十始終無玷可從其請給以郵傳仍令本府歲時存問如有章表附驛以聞舊制致仕官止門謝特召對命坐賜金帛五十萬首途日命近臣宴餞玉津園搢紳榮之其後上聞其病瘧遣使持手劄存問昻獻所著資理論論時政賞罰得失且言天下至廣宜急於擇材以張治具倘限以常牒即英俊無由陞舉上曰昻以退居復貢直言亦可嘉也命以其書付史館臣讀畢口奏從臣之職不但職有所分在屬車豹尾間簮筆持槖以備顧問所謂朝夕論思日月獻納凡君徳有所當修朝政有所當講皆得以進言無隐斯無負古者設官之意若帯職出外雖在田里亦當因事獻言以答際遇待之也重則亦責之也深若其言千慮而有一得上之人聼而行之使居是職者莫不激昻觀感期有補於聖明豈不甚善真宗皇帝奨朱昻直言而以其書付史館雖所以奨近臣亦所以正國論也二十三日入講筵同侍講章􅝘待對是日仍讀優近臣篇景徳四年上謂馮拯曰太原地控北門亦要大臣鎮拊如張齊賢温仲舒皆可此任但嘗在要重慮其固辭卿可先諭此意拯召齊賢語之齊賢曰并州重鎮朝廷腹心之寄但前守荆青州皆是内地尚為近臣交構欲置有過之地今付之邉鎮兼以武事豈敢自保他日煩使敢不盡瘁次詢仲舒仲舒曰若改端揆挈族而徃賜以部署添給敢不承命拯具以上聞上曰是皆不欲徃勿強之臣讀畢口奏真宗皇帝欲以張齊賢温仲舒守太原慮其憚行而使馮拯諭意竟以二臣有辭而止如仲舒之説必欲進秩增祿然後挈族以徃其説陋矣齊賢謂前守荆青皆為人所䜛譖付之重鎮不能自保雖其意雅不欲徃然其説為有理也守邉備塞患不得其人耳苟得其人則財必使之自專将校必使之自擇進退必使之自决持之以久不從中御然後可以望效然而事權如此則䜛譖易生理之必然無足怪者昔魏文侯使樂羊伐中山三年克之歸而論功則謗書盈箧秦武王使甘茂伐韓宜陽五月不㧞樗里子之徒爭之幾至罷兵惟魏文秦武熟於用兵故二臣得盡其技以至集事不然則敗國喪師之不暇何暇成功真宗皇帝鑒太祖成憲任李允則於河北終始不改委任責成之意無所不至凡齊賢之所慮者固不足慮矣因齊賢憚行之説不為無理深中事機因得而推廣之知樞宻院王欽若以疾請告上顧王旦等曰欽若久疾如何旦曰臣等昨徃視之形容甚瘦灼艾三百餘丸馮拯曰欽若不食羊食物多動風氣故常有疾上曰四方之人所食皆異雖繫嗜好不當令至生疾京城百物列於市肆南人所食咸備拯曰欽若自言遇方外士教以不食人或勉其將理則對以不能久坐上曰隠居之士在山林中專務養性乃可絶粒若來城市猶言不能辟榖欽若為大臣總領事務日奉朝請衝渉寒暑反事辟榖之術不亦踈乎當日令醫官診視之臣讀畢口奏儒者之道以飲食為日用之常后稷教民稼穡種藝五榖五榖植而民人育堯舜之治所以冠絶百王未嘗外飲食以為治也自方士以怪誕相勝倡為辟穀之説以眩惑世俗然自秦皇漢武以來未有行此而能長生久視者儒者不道也王欽若身為大臣不以堯舜之道佐君而以方士怪誕之説欺人其心術不正不但此一端而已聖朝之罪人也楊億以疾求觧内署之職仍免修書上曰億昨雖朝參頗甚虚劣未宜以文字勞心苐詔優給假告蠲其朝直又作七言詩賜之及以母疾請告不俟報歸陽翟又遣中使齎御封藥金帛賜之上曰或言億侍從官安得如此自便王旦曰億本寒士先帝賞其詞學寘在舘閣陛下㧞擢冠文史之選倘以公議責之誠為罪人然望察衆言而矜容之上曰億性峭直無所附會文學固無及者或言譏議朝政何也旦曰此蓋與億不足誣搆之辭億受國深恩非土木類譏議之説保其必無上深悟之及疾愈命知汝州御史姜遵言億當屏迹衡茅請罷郡寄上曰億本省母疾無終焉侍養之請昨以疾愈求歸朝故授以一郡遵未諭此意爾臣讀畢口奏人臣峭直無所附會則流俗嫉之䜛譖易至不可不察蓋峭直之人好自修飭持身亷謹不可誣以貪墨遇事公平不可誣以任私其人必風度高爽議論磊落惟有譏議朝政一説可以動人主之聼自古小人之害君子多用此策非啓沃如王旦有以保其不然聖明如真宗有以悟其文致則不測之禍未可知也四月十三日入講筵同侍講陳貴誼待對是日讀議典故篇王欽若嘗言比見石普奏章用新州觀察使印上顧宰相問其事王旦曰普為河西節度知許州此必許州觀察印耳欽若之言謬也大凡節鎮有節度使印隨本使使闕州長吏用本州觀察使印又有州印文曰某州之印晝則錄事參軍掌用暮即納長吏所節度使在本鎮兵刑甲仗事即節度判官掌書記推官連署用節度印民田租賦事即觀察判官支使推官連署用觀察印州司下符刺用本州印皆節度使署故命将必曰某軍節度得專制其軍旅也曰某州觀察使得亷問其風俗也曰某州刺史得刺舉其州事也上然之按石普獨書奏章當用河西節度使印見宋史輿服志臣讀畢口奏唐節度使置於高宗永徽年中觀察使置於肅宗乾元年中其時不同亦各鑄印節度使所以御軍觀察使所以問俗刺史者本漢按部察州之職舉天下不過十二至隋唐改州為郡改郡為州州分為數百則刺史領漢太守之職其後節度使必兼觀察處置使又兼刺史故有藩鎮權重之敝本朝損其兵權改刺史為知州然謂之知某州軍州事者則猶兼掌軍民有節度觀察之職也至於建節猶必曰使持節某州軍州某州刺史某鎮節度某州管内觀察處置等使政和降制乃始不帯持節故今大郡有節度判官推官又有觀察判官有節度掌書記又有觀察攴使雖不復軍民分職而創置之意猶在王旦因石普用印而推究本末非王欽若軰鹵莾比也是日又讀議禮制篇乾徳三年判大理寺尹拙上言案禮令婦為舅姑服朞近代時俗多為舅姑制三年服少卿薛允中言書儀為舅姑服三年事下都省集議太祖謂左右曰昨昭憲皇后之䘮孝明用三年之制然當審議之按當時議者右僕射魏仁浦等二十一人謂婦宜為舅姑服三年詔從之咸平五年南郊禮畢有司請以十一月十六日或二十日大宴時許國長公主在殯上曰主以十五日啓殯用此二日皆靈柩在道未葬之前朕情所不安咸曰王者禮絶朞周上曰禮能行之即為例矣因詔止用十四日就未啓殯之前也景徳元年禮官上言鄭國長公主薨皇王等親並居萬安太后䘮以重掩輕更不成服上曰朕比詣一奠又以卑幼壓降於禮為難然情所未忍即命皇后臨奠親王以下至第成服按是年冬十月戊子明德皇后祔廟後癸巳仍幸故鄭國長公主第明徳太后用葬禮權殯沙臺有司言已經祔廟請吉服還内上甚難其事宰相固以典禮為請上曰朕慮皇族謂已除服不全哀慕之禮可降詔諭雖焚杖絰猶執心喪三年荘穆皇后喪期年上謂近臣曰宫中几筵於禮可撤乎王旦曰當遵孝明故事上曰孝明再期而撤旦曰若以虞練事神免喪祔廟則几筵之設非古也然孝明上仙已用家人之禮荘穆母儀天下十年于茲酌於人情宜守故事王欽若曰几筵之設典禮所無况及朞年撤之可矣上曰但情所不忍豈不傷外家意乎馬知節曰今士大夫未及周歲已再娶矣尚肯設几筵乎馮拯曰此等自傷禮俗何足為言上曰禮沿人情朕守祖宗故事若除之豈禮乎欽若曰雖祖宗故事如詔勅有未便事亦須改况禮典所無亦慮書之簡冊上曰不過云用家人禮且孝明舊制今復行之庸何傷乎卒用再朞而撤臣讀畢口奏凡今日所讀已上數段多是喪服事前朝人臣經筵遇此徃徃不復講讀惟人主高明洞徹無所諱忌然後敢言之也先王制禮自天子達於庶人本無差别後世尊君卑臣故有禮絶朞周之説親親之義於是稍薄歴代因仍行之不以為嫌惟本朝創業之初增重舅姑三年之制下至朞親功親不得不從敝俗又從而加重以至孝宗皇帝掃除漢文以日易月之陋服三年喪為萬世法躬行實行卓冠千古聖性高明累朝一律此歴代之所不能及也二十二日入講筵同侍講王塈待對是日讀謹刑罰篇建隆二年太祖謂宰相曰五代以來諸侯䟦扈至有枉法殺人者朝廷置而不問刑部之職竟廢且人命至重姑息藩鎮當若是耶自今諸州决大辟訖錄案奏聞委刑部覆視之臣讀畢口奏秦漢太守用古諸侯之例皆得專殺以至漢刺史司𨽻校尉唐御史大理官亦得專殺遂有鷹擊毛鷙之吏鐵冐熾炭之獄連坐或至千家流血或至十里至本朝愛惜人命不許專殺每有大辟必錄案聞奏然後人樂其生權歸人主矣太祖嘗讀尚書歎曰堯舜之世四兇之罪止從流竄何近代網法過為靡宻乃知先王用刑蓋不獲已臣讀畢口奏四㓙之罪曰流曰放曰竄皆非死也惟殛鯀則殛者誅也故洪範篇中有鯀則殛死之説即見誅死者惟鯀而已然亦止及其身又用其子以禪天下非如後世夷及三族也讀書泛然不究其本但見四罪而天下服便疑四㓙皆是極刑雖如孔安國研精覃思亦不深究流竄之㫖遂謂四兇皆誅亦沿習之誤惟太祖皇帝洞見經㫖始别白言之仁心發見遂能破千古之惑此經生學士之所不能到也端拱元年靈州河外寨主李瓊以城降賊有司将坐其家属上曰窮邉孤壘又無援兵縁坐之法朕不忍行也二年北兵侵邉邉將言文安大城二縣監軍棄城遁走請以軍法論上遣中使斬之既行謂之曰此奏尚有可疑得無所部召之耶當訊而後决使至訊之果乾寧軍令部送居民入城非擅離所部遽釋之臣讀畢口奏守寨而以城降賊法當縁坐監軍而棄城遁走當論軍法然亦有情輕可閔者不可立為定制也有司以法罪之人主以情赦之斯兩得之矣五月二十二日入講筵同侍講王塈待對是日仍讀謹刑罰篇大中祥符九年大理寺舉官以諳練法律請令檢法上曰朕閲其由歴此人嘗為郡掾以失入贖金若復置法寺豈無間言耶罷之天禧二年起居舍人吕夷簡鞠妖獄請以御史臺主簿張智周推劾上曰智周雖彊幹然其深刻非獄官也天禧三年審刑院言諸州並無奏案冦凖曰漢文帝唐明皇時皆然幾乎刑措蓋當時諸侯專殺有聞于朝廷者有便宜而行者今幅員萬里徒流以上應禀命者皆上奏牘以此較之聖朝刑訟清浄與古不侔蓋陛下以德臨御致此犯法者鮮矣臣讀畢口奏兵寝刑措而後可以言太平其餘皆虚文也此事實難不可以驟致唐明皇兵敗於外而不知骨肉戕於内而不覺不可以言兵寝刑措也漢文帝則近之矣躬行節儉以徳化民則民務本者衆平獄緩刑令行禁止則民犯法者少冦至則屈帝尊以勞軍冦退則慎固封守而不事逺討宜其著效如此也真宗皇帝兼愛南北之民自澶淵和敵之後㽞意政治最重民生選法官則失入者不用選推劾官則深刻者不取如此而寝兵措刑非偶得之者後之人欲兵寝刑措不必逺求漢文陳迹當考祖宗成憲以真宗皇帝為法景徳二年汾州靈石縣監礬邉守信坐赴邑令飲席贖金為私罪上曰若此情輕例為私罪亦可念也當改為公罪自今奏案情輕法重者取裁上覽審刑奏案因顧近臣曰教駿卒與同舍以私忿挾刄刺之又傷其母妻又刺所屬軍校剖心啖之復呼其妻索酒狎飲雖不能自殺亦無能敢擒捕所爭小事兇惡如此獄具當斷腕斬之陜州夏縣尉安起捕平民為盗靣令胥吏拷掠破其胯骨縣令檢視不知偽詐手状稱皆父兄毆損審刑議從公罪仍以胥吏為首上謂知院劉國忠曰靣行訊掠豈專由胥吏耶乃詔刑部詳覆改從私坐大中祥符七年命官有自西川代還部綱京師私抉元封納絲其中遣郵置卒齎擔規免商算審刑請以違制失論上顧知院孫僅曰此得謂之失耶律之欺詐百端皆是大都言失者須思慮所不至此人公為欺詐非失也臣讀畢口奏今日所讀數段皆真宗皇帝景徳祥符間决獄議法之事也人臣以守法為職法有時而拘泥亦有局於偏見撓於私情不能謹於守法惟人主以論道為職變而通之大明一照幽枉畢達且如監礬官赴邑令飲席可以言私亦可以言公綱官規免商算可以言失亦可以言詐故殺人而剖其心豈可以常法理斷捕平民為盗而破其骨豈可以胥吏為首惟人主親决獄議法故得以變通之道處之真宗皇帝享太平之治燕間之際留意獄事如此聖子神孫所當遵守也八月十一日入講筵同侍講范楷待對是日讀論貢舉篇景徳二年将試進士上問天下貢舉人數王旦曰一萬二千餘人約常例奏名十一而已上曰若此則當黜者不啻萬人矣典領之臣必須慎擇晁迥兢慎當以委之周起王青陳彭年皆可參預馮拯曰封印卷首若朝廷遣官主之於理亦順尤須擇素有操守之人旦曰滕元晏於士大夫間少交遊上曰當以朱巽知舉代周起令起與元晏同主封印又召迥等諭之曰取士之意惟務至公使孤寒有藝皆得陞擢今别命官封印卷首俟考定合格者當遣官覆考巽請更命戚綸上曰差官已多則難於商議卿等入院後茍有請求并其封進來朕當命學士撰詔榜貢院門諭貢士以今之條約奨擢寒畯之意臣讀畢口奏科舉取士前代猶兼采譽望至本朝糊名考校彌封謄錄又立别院百計闗防乃始嚴宻按糊名始於蘓易簡知貢舉時至景徳中益詳定考校程式蓋郷舉里選既不可專行於後世則場屋嚴宻極為良法近世人偽日滋姦弊百出省試有全身代筆者御試有全寫套類者如此詐冐皆得前列其源在於士大夫不能平心國事挾以私意發覺有輕重推究其岀入名為不恕其實有力者猶有幸免小人有所窺測轉相倣傚遂至於此若此弊不革則科舉取士遂為虚設矣
