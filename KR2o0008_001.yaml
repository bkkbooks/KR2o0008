body:
  text: 經幄管見卷一宋曹彥約撰寶慶元年九月十七日初供職同侍講范楷候對是日讀寶訓謹外戚篇景德四年上謂近臣曰每嵗承天節皇諸親為姻族求恩多過有希覬朕常念羣臣戮力盡瘁或逺在邊防久厯嵗時非功狀顯著未嘗進一資一級此若盡遂所請甚紊公道自後奏封有越例者即令內省勿復降出陳堯叟曰臣等比來多見妄有陳乞如秦國公主為子求刺史諸子嵗嵗改轉又圖舟車悉免稅算去年程繼宗掌致逺務坐事致鞫晉國公主亟為求替如此之事陛下皆寢其奏中外之人知陛下推公御人不以親疏為異上曰諸親多引先朝為比朕諭以太祖開創之始太宗英睿特斷朕安敢上擬今庶事動立制度朕遵守之何敢失墜若從越例之請外人必有竊議邇來漸似知非各安本分矣臣讀畢口奏人主遵奉家法吝惜名器未有不身致太平者真宗皇帝有太祖太宗家法可守更於家法上倍加吝惜推此心以往事事節省謹之於外戚必將謹之於宦官謹之於宦官又將謹之於宫女上而服御下而賜豫無所不謹則無所不省財用安得不裕民力安得不寬此咸平景德間所以為本朝極盛也二十二日同侍講范楷候對是日讀寶訓受符瑞篇夀州獻緑毛龜按事在太宗至道三年上謂宰相曰朕觀之介蟲而毛得非天意有所警戒耶吕端曰臣等寡聞天意冥邈胡能究知然嘗聞師曰聖人之意與天合符茍睿思徘徊屬於一物必神靈肸蠁有所啓焉今神龜所得之處地名夀春陛下頃升皇儲實自夀邸由是言之則是龜也特為陛下而言將使陛下後天而老既夀且昌乎又龜在水族義主乎隂介者剛物也毛者柔物也夫夷狄之類皆禀陰氣天戒若曰將有强梗不賔之虜柔伏來庭且陛下自即大位首念西北之人困於飛挽雖繼遷凶羯亦降使推恩不問前罪且繼遷亡命日久亦厭兵矣脅從之黨亦厭亂矣悛心革面匪朝而夕北戎倔强為患滋深部族擕離亦荐饑歉必恐相率懷柔願伸欵附望陛下欽若天意彌闡皇猷雖休勿休日謹一日則靈物之出豈徒然哉臣讀畢口奏用兵之害不但兩軍相加肝腦塗地而已飛挽之勞不減鋒鏑暴露之久甚於臨敵以至邊民避難永業漸廢强壯應募耕夫漸少流離轉徙使老弱疾病之人少有全者怨氣所感多致旱蝗饑餓疾疫而死者又不可勝計簡冊所載未必詳盡惟身厯而後知之此寢兵所以為帝王極功也景德四年上謂宰相曰前詔諸路無得獻祥瑞近日頗逾舊制當令禮部申禁之宰相曰福應之至以顯盛猷雖睿德謙冲務於自損若史臣不紀來世何觀望止令報禮部關送史官上勉從之臣讀畢口奏祥瑞之與災變相為有無有祥瑞則無災變有災變則無祥瑞古人以晏安為鴆毒以譴告為仁愛蓋覩祥瑞則易至自滿遇災變則易生恐懼昔魏相相漢宣帝凡四方逆賊災變之事無不奏言之正得此意真宗皇帝禁諸路無獻祥瑞聖意深逺惜乎當時大臣尚欲關送史官也大中祥符元年正月天書降左承天門上召近臣對崇政殿西序諭其事王旦曰陛下以至誠事天地以仁孝事祖宗恭已愛人夙夜求治以至殊方修睦獷俗請吏干戈偃戢年穀屢豐皆陛下兢兢業業日謹一日之所致臣等嘗謂天道不逺必有昭報今者神授祕文實彰祐德之應然兹事非常簡策所無又未審所諭之事啓封之際當屏左右上曰既有天命須當祇受適恐皇城司遽便收進已使止之朕當詣門望拜㷊香跪受所云屏人以啓雖云勿泄天機朕以為上天所貺當與衆共之旦曰蓋未測書意不欲顯示於衆上曰天若謫視闕政當與卿等祇畏改悔若告戒朕躬亦當責已自修豈宜隱之使人不知乎當便與卿等啓讀但慮文莫能辨宜訪明習篆籕之人以從旦曰陛下肅奉天命非臣等所能測度臣讀畢口奏天人相與之際無有間斷人主與天為一得知闕政所在必將修德用賢以補治之此周宣遇災而懼所以王化復行也若掩覆不已如愚人之諱病其初唯恐人知其後遂至於不可措手當大中祥符時寧有闕政真宗皇帝恐懼修省如此天下安得不治上曰朕自即位每祠祀祝詞但以人民為心未嘗别有祈請今內殿道場亦致密詞惟求年穀豐穰人民康樂因出示旦等旦曰自古祕祝之詞皆有所請陛下以億兆為心有以見子育之意超絶前古臣讀畢口奏得人心而為天子則社稷自然鞏固若福萃於人主而災遍於天下為人主者亦何安於此也天書扶侍使丁謂言崇政殿閲新製法物雙鶴度天書輦飛舞良久翌日上顧左右曰昨所觀鶴止於輦上飛度若云飛舞良久文則文矣恐不為實當易此奏也王旦曰陛下以至誠奉天以不欺臨物正此數字所繫尤深帝皇徽猷莫大於此望付中書載於時政記上俯然從之臣讀畢口奏人主奉天臨民以不欺為主若以鶴度為鶴舞欺天罔民不特天鑒昭昭民心不服濫觴不止必將有如漢臣指鶡雀為神雀者矣十月初三日便殿聚講同侍講陳貴誼候對是日讀寶訓崇祀禮篇淳化三年祕書監李至上言國初舉藏氷之禮修司寒之祭常以四月行之按詩豳七月四之日獻羔祭韭周以十一月為正四月即今之二月春秋傳曰日在北陸而藏氷謂夏十二月日在虛危也獻羔而啓之謂二月春分獻羔祭韭始開氷室也火出而畢賦火星昏見謂三月四月中也又月令仲春天子獻羔開氷先薦寢廟詳其開氷之祭當在春分乃有司之失也上曰今四月韭長可苫屋矣何謂薦新耶即命正其禮臣讀畢口奏夏正建寅人道之所便周正建子天道之所始自古未有兼用之者惟豳七月之詩作於成周之時乃上述后稷先公事一篇之中既有夏正又有周正如七月流火九月授衣七月食瓜八月斷壺之類凡以月言者皆夏正也一之日觱發二之日栗烈二之日鑿氷冲冲三之日納于凌陰之類凡以日言者皆周正也按經文凡陽生以後之月言日凡陰生以後之月言月四月言月者陽極陰生當夏至進退之期也苐謂雜周正夏正雖本朱子義似未盡李至所言引用獻羔祭韭一事已合經意臣恐後人疑其詩雜周正夏正故為别白言之至道二年禮儀使宋白上言按儀注朝享太廟皇帝先詣罍洗奠瓚郊祀未詣罍洗先奠玉幣於禮未叶欲請先詣罍洗上覽奏遽召白洎宰相問之曰前代祀上帝未罍洗而先奠玉幣於禮可乎按杜佑通典開元禮祀圜丘儀於進熟之先太常卿引詣罍洗在奠玉幣後宋初尚沿其舊吕端等曰王者親執玉帛以見上帝且玉帛者接神明之贄尤宜蠲潔若未盥沃而奠獻殊失恭䖍之意宋白曰儻允臣所陳止一次登壇上悚然改容曰朕親奉大祭竭誠盡物蓋為蒼生祈福倘變禮為允固當依卿所奏如合遵舊典朕雖百次登亦不為勞端等皆言禮官所陳得中遂從白議臣讀畢口奏宋白請郊祀先盥沃而後奠獻從禮之厚也以兩次登壇為勞而以一次為便禮之殺也太宗皇帝竭誠盡物以事上帝豈以再登壇為勞而變其禮哉其意則是其言則非吕端等取其意而不取其言始足以釋太宗之惑人臣獻䇿意是而言非足以害事不可以不謹十二日同侍講范楷待對是日仍讀崇祀禮篇初禮官草封禪儀上覽之謂王旦曰封禪久廢非禮典備具豈為盡美朕遍覽所定儀注有二十餘事慮未合宜已手詔改定如未備者當復議之雖有司已經講肄其如未嘗躬習王旦曰大凡祀事未聞帝王自為儀升降之節止在有司上曰王者事天如子之事父臣之事君寅恭之志豈憚於勞及親習畢又以御劄記三事付有司曰行事官避朕褥位而不顧昊天上帝之位但昭報天地嚴配祖宗豈於朕躬過為崇奉當諭行事官無得更有回避朕以封禪之事不比常祀自十一月朔即御蔬膳原注大中祥符元年十月二十四日辛亥有事於泰山其月以戊子為朔初四日辛卯車駕發京師恐御蔬膳當在十月朔諸本皆作十一月朔者誤也旦曰陛下躬行大禮曲盡嚴恭然日月尚遙道途涉寒慮非保衛之道况南郊亦祀天地不聞預屏葷茹望俟致齊或散齊方進素膳旦等纍表陳前上曰朕志已定不煩固請及升泰山每道經險峻必降輦徒步所司議增扶衛皆卻之導從者或至疲頓上詞氣益壯及行禮侍從導衛悉令減去拂翟止於壝門燭籠前導亦撤之及禪祭自山下步出大次侍臣言山路峻滑靴袍而行躋升匪易請乘步輦上曰接神在近敢不徒行五使等復固請上終不許臣讀畢口奏封禪之說始見於管夷吾之書以無懷氏伏羲氏為首莫知其有無也設或有之是時禮文簡略固無傷財動衆之事至三代之季齊威公偶欲行之迫於世變非昔者洪荒之比雖泰山在其近境管氏已知其不可所謂一茅三脊魚比目而鳥比翼者皆飾辭以為難耳後世乃指為實迹更求祥瑞然泰皇漢帝因行幸而為之猶是簡徑至光武溺於䜟緯更作密詞於是玉牒玉檢之文金鏤金泥之制纎悉備具為其臣梁松等所鄙至唐髙宗則又從以宫女飾以錦繡尤更可笑今真宗皇帝親製儀注又躬自肄習御蔬膳於兩旬之前却步輦於峻滑之地凡所以事神者無不恭恪凡所以自奉者無不謙退可謂萬世封禪之標準也但近世封禪之禮事大體重必須傷財必須動衆不可以無懷伏羲氏為口實必如真宗之時家給人足上恬下熙而又以孝敬行之始為無玷舍是不足以格神秖足以害民也二十六日入講筵同侍講陳貴誼待對是日讀寶訓崇文儒篇咸平元年學究劉可名上經書疑誤上因訪通經義者李至曰國學講書崔頤正博通諸經尤善誦說上曰朕宫中無事甚樂聼書嘗求其人尤未易得翌日召頥正於後園說尚書大禹謨賜五品服謂宰相曰頥正講誦有功卿等更於班行中擇性行淳朴通經義知損益者一兩人具名進來臣讀畢口奏通經義知損益者易得性行淳朴者難求夫講讀於人主之前必其人先能正已而後可以正君若使口道先王語而行若市人則於講讀之際希望官職萋斐忠賢或迎合上意或傅會經㫖如先朝諸臣吕惠卿邢恕之徒非不稍通經義而性行不淳朴甘為小人渠魁雖生於聖明之世亦足以惑亂天下以此知真宗皇帝擇性行淳朴以為講讀有深意也上嘗謂近臣曰朕聼政之日未嘗虛度時日探賾編簡素所耽玩但古聖奧㫖有未曉處不免廢忘昨置侍講侍讀學士自今令祕閣官每夕具名奏來朕欲召見得以訪問是後每當直或召對多至二三鼓而退臣讀畢口奏講學之道不必拘於誦說之時惟於藏焉修焉息焉游焉之際最為親切漢光武講論經理夜分乃寐所以致中興之治卜年卜世與前漢相似本朝祖宗時近臣內直多近燕閒偃息之所故太宗時吕文仲真宗朝楊徽之夏侯嶠邢昺之徒往往召對詢訪或至中夕從容閒暇使古人事業與今日施行相為表裏使古人制行與今日聖德互相發明較之講殿講筵所得又爭深淺何况燕閒之時親儒生之時常多則宦官宫女進見之時差少此又聖人執德信道之微權有深意也咸平五年召近臣觀書龍圖閣上曰朕自幼至今讀經典其間有聼過數四者臣讀畢口奏真宗皇帝讀經典聼過數四不以為厭最得為學之要大凡讀書不在貪多必使口中成誦心中默識其初所見容有未盡其後益更增長與泛然過目者不同最為有益時敏既務厥修自來有不可遏者景德二年幸國子監厯覽書庫覩羣書鏤版問其數邢昺曰國初印板止四千今已十萬經史義疏悉備臣始業儒儕輩間能具書疏百無一二蓋難得正本或力不能繕寫今士庶之家多藏典籍信逢時之至幸上曰國家崇尚儒術然非四方無事亦何以臻此臣讀畢口奏真宗皇帝謂國家崇尚儒術非四方無事何以臻此蓋兵革一用豈但征戰饋餫之勞流離轉徙之苦臣前讀符瑞篇固已略舉用兵之害矣上而為君不免宵衣旰食下而為臣不免罷於奔命此古之聖賢所以偃武而後修文息馬而後論道也真宗皇帝四方無事之語發於景德二年是時澶淵之盟契丹才一年耳而聖訓已及此則知兵革不用乃聖人本心自是絶口不談兵矣大中祥符元年幸曲阜謁文宣王廟有司定儀止肅揖上特展拜以表嚴師崇儒之意又幸孔林以林木擁道降輿乘馬詣墳拜奠臣讀畢口奏堯舜之道載於五篇之書寂寂簡端非聖哲不能盡究孔子之道廣大悉備立標準於天下後世靡所不周取之不盡用之不竭故當時弟子以為賢於堯舜逺矣非卓然髙識好善而忘勢孰肯舉特拜之禮也十一月初三日便殿聚講同侍講王塈候對是日讀奬詞學篇張洎為翰林學士上顧左右曰洎富有詞藻于今力學江東士人中首出也搢紳之士當念德行居先茍空持文學亦所不取仲尼四教止言文行吕䝉正曰唐裴行儉嘗言王楊盧駱四子雖有文學為人輕浮匪惟不享重祿兼慮弗克令終後果如其言則德行為先誠如聖㫖臣讀畢口奏有文士之文有賢者之文賢者之文得於學問本於踐履義理深熟自然成文如先朝歐陽修蘇軾之倫為一代端人正士文既浩博而德望可稱此賢者之文也文人之文不可謂之不工然不敢保其為人如丁謂夏竦之徒凡所著述亦足以膾炙人口然不可為法於後世太宗皇帝論文學之士必以德行居先則知太宗之好文不在於絺章繪句之間矣上閲殿中丞李虛已課績賜御書印紙虛已獻詩稱述且言祖母八十餘覩此榮耀益為殊美上覽而嘉之御筆批其詩尾云李虛已學古為官榮親事主知恩奉上欲布新規朕已得良二千石矣宜賜緋魚賚錢五十萬惠及祖母時已命知榮州即日改遂州又語宰相曰朕不遺片善想虛已承朕褒諭固不為惡事矣乃召兩制三館遍示之又聞虛已父寅亦御前及第休官侍養上曰積善之家必有餘慶非虛語也臣讀畢口奏人才有三等上焉者天資律已有心愛民勸戒之所不必用刑罰之所不必施次焉者可與為善可與為惡觀人主意嚮所在利而行之亦足以助治下焉者知有利而不知有仁義知有已而不知有君民必須小懲大戒然後知畏太宗皇帝閲李虗已課績既親書印紙以寵之又謂虛已承此褒諭不為惡事君臣之懿亘古無比舉直錯諸枉可使枉者直矣然至於貪酷之吏略不少貸輕者配隸居作重者置之極典本朝以仁厚開國何至於此而加重蓋貪酷不已則民生不能遂民生不能遂則邦本不能固嚴於貪酷之吏乃所以仁愛天下之極也上嘗覽詞臣所獻聖製琴阮頌謂宰相曰邇來朝廷文學之盛近代無及朕遍閲頌贊第其工拙惟楊億趙安仁李宗諤詞理愜當有老成之風吳淑安德裕胡旦或詞采古雅或學問優博抑其次也即詔宗諤安仁各遷一官賜億緋魚及召淑等褒諭之億對又戒之曰朕素知汝文學更當遵守儒行韜晦其能茍謙虛守道可保令名因問年幾何曰始年十一釋褐授官今二十二矣上笑曰少年聰明信是天賦李宗諤者司空致仕昉之子翌日昉亦入謝上命坐昉曰男宗諤所獻文已聞陛下過賜賞歎不謂復與進秩父子感恩何以為報上曰此新題也尤難為工楊億最可稱奬自幼在館俄忽二十二文學大進朕聞唐王勃十五作滕王閣記時輩歎服觀億亦勃之比也楊億嘗上表上曰億天與文性好學不倦每覽制作不易多得溫仲舒曰陛下好文故才俊間出億若不遇聖鍳乃京華一旅人爾臣讀畢口奏天下未嘗無才視人主意嚮何如耳好儒雅則儒雅進好忠直則忠直進好廉勤則廉勤進好篤行則篤行進無所不好則無所不進自古無所不好未有若漢武之甚者好征戰則有衛青霍去病好財利則有孔僅桑宏羊甚至好滑稽則有東方朔枚臯好神仙則有公孫卿欒大彼蓋誤用其心者猶能以得人之盛稱於後世何况人主一意儒雅一意忠直一意廉勤一意篤行安有上作而下不應之理溫仲舒謂太宗好文故英俊間出特為好文一事而發因得以推廣之初九日入講筵同侍講范楷待對是日仍進講奬詞學篇上覽集賢校理晏殊所獻賦謂宰相曰殊年少孤立力學自奮加以沉密造次不踰矩京城賜酺但掩關與弟觀書著文亦可稱也臣讀畢口奏此賜酺當是景德四年也此禮久廢太宗皇帝始行於雍熙元年至真宗皇帝復行之殊以景德初試文賜出身當是此時酺字或從酉或從月或從食或音步或音蒲或音逋按說文酺王德布大飲酒也從酉甫聲薄乎切脯乾肉也從肉甫聲方武切餔日加申時食也從食甫聲博狐切三字音義逈别司馬光類篇酺脯竝蓬逋切義同未知何據在三代時載於周禮者有春秋祭酺之事族師之官因祭酺而與民以酒食相獻酬遂以為會聚酒食之名趙武靈王滅中山始賜酺五日漢文帝自代來即帝位亦賜酺五日漢禁羣飲故賜酺則許民會聚唐無飲禁故賜酺則聚作伎樂賜髙年酒麵本朝則分日燕享下及父老法雖不同其為聚會酒食一也近代多讀作奔模切以孟子餔啜字從食與此同音也是日又讀謹詔辭篇大中祥符四年皇親赴安陵襄事者賜詔撫問有言歸洛汭之語上指示近臣曰永安在洛水之南言洛汭非也學士屬文用事尤宜愜當即無譏嫌矣臣讀畢口奏尚書三言洛汭在禹貢則導河積石東過洛汭在五子之歌則厥弟五人徯於洛之汭在召誥則太保攻位於洛汭其地不同皆在大河之南洛水之北故孔安國謂水北曰汭鄭康成謂汭者內也按水北曰汭見禹貢涇屬渭汭孔安國傳召誥孔頴達正義謂水內曰汭鄭康成箋詩芮鞫之即從之而於周禮雍州其川涇汭其浸渭洛則以汭為水名在豳地賈公彥嘗辨之杜預注左傳館於雒汭謂水曲流為汭不泥南北之說又爾雅崖內為隩外為隈邢昺疏云內曲裏也外曲表也取以證五子之歌畋於有洛之表之文義似較勝今本朝諸陵在永安縣乃在洛水之南真宗皇帝考論及此不特博通諸家注疏又且深識山川面勢書生之所不到當時學士可謂失職
