body:
  text: 經幄管見史評類提要臣等謹案經幄管見四卷宋曹彦約撰彦約字簡甫都昌人淳熙八年進士薛叔似宣撫京湖辟為主管機宜文字累官寶謨閣待制知成都府寶慶元年擢兵部侍郎遷禮部旋授兵部尚書力辭不拜以華文閣學士致仕卒諡文簡事迹具宋史本傳是書蓋彦約侍講筵時所輯皆取三朝寶訓反覆闡明以示效法蓋即范祖禹帝學多陳祖宗舊事之義考仁宗天聖五年允監修王曽之請采太祖太宗真宗事迹不入正史者命李敬等别為三朝寶訓三十卷寶元二年十二月詔以進讀嗣是講幄相沿遂為故事彦約是書於進讀符瑞諸篇雖不免有所迴䕶要亦當時臣子之詞不得不爾其餘諸篇則皆能旁證經史而歸之於法誡亦可謂不失啟沃之職者矣舊刻散佚久無傳本惟永樂大典尚載其全文今詳為校讐釐成四卷間有辨證各依文附著焉乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:78d82d15a47e02271f6766b42e131afe78a297c3b8c81f378054788cfd343c08
